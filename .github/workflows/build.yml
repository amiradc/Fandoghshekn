name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🛠️ گام جدید: دانلود و آماده‌سازی خودکار مترجم شبکه Tun2Socks
      - name: Download and Prepare Tun2Socks
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          echo "🔍 در حال یافتن آخرین نسخه لایه مترجم Tun2Socks..."
          LATEST_URL=$(curl -s https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest | grep "browser_download_url.*android-arm64\.zip" | cut -d '"' -f 4)
          
          if [ -z "$LATEST_URL" ]; then
            LATEST_URL=$(curl -s https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest | grep "browser_download_url.*android-arm64" | cut -d '"' -f 4)
          fi
          
          echo "📥 در حال دانلود از: $LATEST_URL"
          curl -L -o tun2socks.zip "$LATEST_URL"
          
          echo "📦 استخراج فایل باینری..."
          unzip -o tun2socks.zip -d tun2socks_extracted
          
          echo "⚙️ انتقال و تغییر نام به ساختار نیتیو اندروید..."
          find tun2socks_extracted -type f -name "*tun2socks*" -exec mv {} app/src/main/jniLibs/arm64-v8a/libtun2socks.so \;
          chmod +x app/src/main/jniLibs/arm64-v8a/libtun2socks.so
          
          echo "✅ فایل libtun2socks.so با موفقیت در پروژه تزریق شد!"

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
